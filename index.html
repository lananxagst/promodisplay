<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Display - Customer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="promotion-title">PROMOTION</h1>
        </header>
        
        <main class="main-content">
            <div class="carousel-container">
                <div class="carousel">
                    <div class="carousel-slide active">
                        <img src="https://picsum.photos/seed/promo1/800/400.jpg" alt="Promotion 1">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/promo2/800/400.jpg" alt="Promotion 2">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://picsum.photos/seed/promo3/800/400.jpg" alt="Promotion 3">
                    </div>
                </div>
                
                <button class="carousel-btn prev-btn" onclick="changeSlide(-1)">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="carousel-btn next-btn" onclick="changeSlide(1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
                
                <div class="carousel-indicators">
                    <span class="indicator active" onclick="goToSlide(0)"></span>
                    <span class="indicator" onclick="goToSlide(1)"></span>
                    <span class="indicator" onclick="goToSlide(2)"></span>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026 Promo Display. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
