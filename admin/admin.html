<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Display - Admin</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1 class="admin-title">ADMIN PANEL</h1>
        </header>
        
        <main class="admin-main">
            <div class="admin-section">
                <h2><i class="fas fa-upload"></i> Upload Promotion Images</h2>
                <div class="upload-area">
                    <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                    <div class="upload-box" onclick="document.getElementById('imageUpload').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload images or drag and drop</p>
                        <p class="upload-hint">PNG, JPG, GIF up to 10MB</p>
                    </div>
                    <div class="uploaded-images" id="uploadedImages">
                        <!-- Uploaded images will be displayed here -->
                    </div>
                </div>
            </div>
            
            <div class="admin-section">
                <h2><i class="fas fa-toggle-on"></i> Promotion Control</h2>
                <div class="toggle-container">
                    <div class="toggle-item">
                        <label for="promoToggle">Enable Promotions</label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="promoToggle" checked>
                            <span class="slider"></span>
                        </div>
                    </div>
                    <div class="toggle-status" id="toggleStatus">
                        <i class="fas fa-check-circle"></i> Promotions are currently active
                    </div>
                </div>
            </div>
            
            <div class="admin-section">
                <h2><i class="fas fa-images"></i> Current Promotions</h2>
                <div class="current-promotions" id="currentPromotions">
                    <!-- Current promotions will be displayed here -->
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2024 Promo Display Admin Panel. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
